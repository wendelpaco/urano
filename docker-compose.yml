services:
  postgres:
    image: postgres:16-alpine
    container_name: urano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urano
      POSTGRES_PASSWORD: urano_dev
      POSTGRES_DB: urano_finbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - urano-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urano -d urano_finbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urano-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - urano-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  urano-net:
    driver: bridge

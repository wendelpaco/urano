services:
  postgres:
    image: postgres:16-alpine
    container_name: urano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urano
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: urano_finbot
    # Bind localhost only — never expose Postgres on the LAN/internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - urano-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urano -d urano_finbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urano-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}
    # Bind localhost only — never expose Redis on the LAN/internet.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - urano-net
    healthcheck:
      # requirepass is set — must AUTH before PING
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}

  # Optional API process (profile "full"). Default `compose up` stays postgres+redis only.
  # Build context is monorepo root (lockfile + workspace layout).
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: urano-api
    restart: unless-stopped
    profiles: ["full"]
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Override host-oriented URLs from .env so the container hits compose services
      DATABASE_URL: postgres://urano:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}@postgres:5432/urano_finbot
      REDIS_URL: redis://:${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}@redis:6379
      NODE_ENV: production
      RATE_LIMIT_FAIL_CLOSED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - urano-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  urano-net:
    driver: bridge

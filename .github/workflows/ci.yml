name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urano
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: urano_finbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U urano -d urano_finbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://urano:ci_secret@localhost:5432/urano_finbot
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: API migrate
        working-directory: apps/api
        run: bun run db:migrate
      - name: API tests
        working-directory: apps/api
        run: bun test
        env:
          # Unitários não devem depender de Postgres; integração usa CI=true
          CI: true
      - name: API integration smoke
        working-directory: apps/api
        env:
          CI: true
          RUN_INTEGRATION: '1'
        run: bun test tests/integration/
      - name: Lint API and Web
        run: bun run lint
      - name: Web build
        run: bun run --filter urano-web build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OSV Scanner
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=./bun.lock
